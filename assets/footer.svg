<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="VENOM footer">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#241410"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <linearGradient id="fwave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a211c"/>
      <stop offset="50%" stop-color="#e0392f"/>
      <stop offset="100%" stop-color="#7a211c"/>
    </linearGradient>
    <filter id="fg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes fpulse { 0%,100%{opacity:.6} 50%{opacity:1} }
      .fp{ animation:fpulse 3.5s infinite ease-in-out }
    </style>
  </defs>
  <rect width="1200" height="220" fill="url(#fbg)"/>
  <!-- wave -->
  <path d="M0 40 Q150 10 300 40 T600 40 T900 40 T1200 40 V0 H0 Z" fill="url(#fwave)" opacity="0.18"/>
  <path class="fp" d="M0 44 Q150 14 300 44 T600 44 T900 44 T1200 44" fill="none" stroke="#e0392f" stroke-width="2" filter="url(#fg)"/>

  <text x="600" y="112" text-anchor="middle" fill="#efe7d8" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="40" letter-spacing="8" filter="url(#fg)">VENOM</text>
  <text x="600" y="146" text-anchor="middle" fill="#d8c9a8" font-family="Arial,sans-serif" font-size="15" letter-spacing="3">ENGINEERED BY&#160;&#160;SHEEL PATEL&#160;&#160;&#215;&#160;&#160;ANIRUDH NAUTIYAL</text>
  <text x="600" y="174" text-anchor="middle" fill="#c2a878" font-family="'Courier New',monospace" font-size="12.5" letter-spacing="2" opacity="0.9">from a vision to victory&#160;&#160;&#183;&#160;&#160;2024 &#8594; 2025&#160;&#160;&#183;&#160;&#160;national hackathon winners</text>
  <line x1="430" y1="194" x2="770" y2="194" stroke="#4d3b30" stroke-width="1.4"/>
</svg>
