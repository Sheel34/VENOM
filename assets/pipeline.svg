<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" role="img" aria-label="VENOM real-time control pipeline">
  <defs>
    <linearGradient id="cardEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0392f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7a211c" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="cardFill" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1f1511"/>
      <stop offset="100%" stop-color="#100a08"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#14100b"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </radialGradient>
    <filter id="g2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e0392f"/>
    </marker>
    <style>
      @keyframes march { to { stroke-dashoffset: -28; } }
      @keyframes glowPulse { 0%,100%{ opacity:.5 } 50%{ opacity:1 } }
      @keyframes nodeBreath { 0%,100%{ opacity:.85 } 50%{ opacity:1 } }
      .flow { stroke-dasharray: 7 7; animation: march 1s infinite linear; }
      .ttl { font-family:'Arial',sans-serif; font-weight:800; fill:#efe7d8; }
      .sub { font-family:'Courier New',monospace; fill:#d8c9a8; }
      .num { font-family:'Arial',sans-serif; font-weight:900; fill:#1a0d0a; }
      .card { animation: nodeBreath 4s infinite ease-in-out; }
      .label { font-family:'Courier New',monospace; fill:#c2a878; }
    </style>
  </defs>

  <rect width="1200" height="470" fill="url(#bg2)"/>
  <text x="600" y="42" text-anchor="middle" class="ttl" font-size="22" letter-spacing="4">REAL-TIME CONTROL PIPELINE</text>
  <text x="600" y="66" text-anchor="middle" class="label" font-size="12.5" letter-spacing="2" opacity="0.85">your hand becomes the controller &#8212; gesture to grip in one continuous loop</text>

  <!-- connectors (drawn first, behind cards) -->
  <g fill="none" stroke="#e0392f" stroke-width="2.2" marker-end="url(#arrow)">
    <line class="flow" x1="190" y1="210" x2="226" y2="210"/>
    <line class="flow" x1="384" y1="210" x2="420" y2="210"/>
    <line class="flow" x1="578" y1="210" x2="614" y2="210"/>
    <line class="flow" x1="772" y1="210" x2="808" y2="210"/>
    <line class="flow" x1="966" y1="210" x2="1002" y2="210"/>
  </g>
  <!-- comet dots -->
  <g fill="#f3ece0" filter="url(#g2)">
    <circle r="3.2"><animate attributeName="cx" values="60;1150" dur="3.2s" repeatCount="indefinite"/><animate attributeName="cy" values="210;210" dur="3.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle r="2.4"><animate attributeName="cx" values="60;1150" dur="3.2s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="cy" values="210;210" dur="3.2s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3.2s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle r="2.4"><animate attributeName="cx" values="60;1150" dur="3.2s" begin="2.2s" repeatCount="indefinite"/><animate attributeName="cy" values="210;210" dur="3.2s" begin="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" dur="3.2s" begin="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ============ NODES ============ -->
  <!-- node template positions: 40,234,428,622,816,1010 ; w=150 h=150 ; cy box 135..285 -->

  <!-- 1 HAND -->
  <g class="card">
    <rect x="40" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="115" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="115" y="125" text-anchor="middle" class="num" font-size="16">1</text>
    <!-- hand glyph -->
    <g transform="translate(115,182)" stroke="#e0392f" stroke-width="3.2" fill="none" stroke-linecap="round">
      <line x1="-16" y1="6" x2="-16" y2="-14"/><line x1="-6" y1="8" x2="-6" y2="-20"/>
      <line x1="4" y1="8" x2="4" y2="-22"/><line x1="14" y1="6" x2="14" y2="-16"/>
      <path d="M-22 6 Q-24 22 -8 26 L12 26 Q24 22 22 4"/>
    </g>
    <text x="115" y="236" text-anchor="middle" class="ttl" font-size="15">OPERATOR HAND</text>
    <text x="115" y="256" text-anchor="middle" class="sub" font-size="10">natural gesture</text>
    <text x="115" y="270" text-anchor="middle" class="sub" font-size="10">no joystick</text>
  </g>

  <!-- 2 VISION -->
  <g class="card">
    <rect x="234" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="309" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="309" y="125" text-anchor="middle" class="num" font-size="16">2</text>
    <g transform="translate(309,180)" stroke="#e0392f" stroke-width="2.6" fill="none">
      <rect x="-22" y="-14" width="44" height="30" rx="5"/><circle cx="0" cy="1" r="8"/><circle cx="0" cy="1" r="2.5" fill="#e0392f"/>
    </g>
    <text x="309" y="236" text-anchor="middle" class="ttl" font-size="15">VISION</text>
    <text x="309" y="256" text-anchor="middle" class="sub" font-size="9.5">1080p &#183; 60 FPS cam</text>
    <text x="309" y="270" text-anchor="middle" class="sub" font-size="9.5">MediaPipe 21-pt</text>
  </g>

  <!-- 3 MAP + DEPTH -->
  <g class="card">
    <rect x="428" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="503" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="503" y="125" text-anchor="middle" class="num" font-size="16">3</text>
    <g transform="translate(503,182)" stroke="#e0392f" stroke-width="2.6" fill="none">
      <line x1="-22" y1="14" x2="-22" y2="-16"/><line x1="-22" y1="14" x2="22" y2="14"/>
      <path d="M-22 10 Q-6 12 2 -2 T22 -12" stroke="#d8c9a8"/>
    </g>
    <text x="503" y="236" text-anchor="middle" class="ttl" font-size="14.5">MAP + DEPTH</text>
    <text x="503" y="256" text-anchor="middle" class="sub" font-size="9.5">X/Y workspace map</text>
    <text x="503" y="270" text-anchor="middle" class="sub" font-size="9.5">polynomial Z</text>
  </g>

  <!-- 4 LINK -->
  <g class="card">
    <rect x="622" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="697" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="697" y="125" text-anchor="middle" class="num" font-size="16">4</text>
    <g transform="translate(697,184)" stroke="#e0392f" fill="none" stroke-width="2.6" stroke-linecap="round">
      <path d="M-18 0 A18 18 0 0 1 18 0" opacity="0.5"/>
      <path d="M-11 -7 A11 11 0 0 1 11 -7" opacity="0.8"/>
      <circle cx="0" cy="-2" r="2.6" fill="#e0392f"/>
    </g>
    <text x="697" y="236" text-anchor="middle" class="ttl" font-size="15">Wi-Fi LINK</text>
    <text x="697" y="256" text-anchor="middle" class="sub" font-size="9.5">TCP socket</text>
    <text x="697" y="270" text-anchor="middle" class="sub" font-size="9.5">port :12345</text>
  </g>

  <!-- 5 ESP32 RTOS -->
  <g class="card">
    <rect x="816" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="891" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="891" y="125" text-anchor="middle" class="num" font-size="16">5</text>
    <g transform="translate(891,180)" stroke="#e0392f" stroke-width="2.4" fill="none">
      <rect x="-16" y="-14" width="32" height="28" rx="3"/>
      <line x1="-16" y1="-6" x2="-22" y2="-6"/><line x1="-16" y1="4" x2="-22" y2="4"/>
      <line x1="16" y1="-6" x2="22" y2="-6"/><line x1="16" y1="4" x2="22" y2="4"/>
      <line x1="-6" y1="-14" x2="-6" y2="-20"/><line x1="6" y1="-14" x2="6" y2="-20"/>
    </g>
    <text x="891" y="234" text-anchor="middle" class="ttl" font-size="14.5">ESP32 &#183; RTOS</text>
    <text x="891" y="254" text-anchor="middle" class="sub" font-size="9.5">FreeRTOS dual-core</text>
    <text x="891" y="268" text-anchor="middle" class="sub" font-size="9.5">inverse kinematics</text>
  </g>

  <!-- 6 ARM -->
  <g class="card">
    <rect x="1010" y="135" width="150" height="150" rx="16" fill="url(#cardFill)" stroke="url(#cardEdge)" stroke-width="1.6"/>
    <circle cx="1085" cy="120" r="15" fill="#e0392f" filter="url(#g2)"/>
    <text x="1085" y="125" text-anchor="middle" class="num" font-size="16">6</text>
    <g transform="translate(1085,182)" stroke="#e0392f" stroke-width="3" fill="none" stroke-linecap="round">
      <circle cx="-16" cy="14" r="3.4" fill="#e0392f" stroke="none"/>
      <line x1="-16" y1="14" x2="-2" y2="-10"/><line x1="-2" y1="-10" x2="16" y2="-16"/>
      <path d="M16 -16 l8 -3 M16 -16 l5 7" />
    </g>
    <text x="1085" y="236" text-anchor="middle" class="ttl" font-size="15">6-DOF ARM</text>
    <text x="1085" y="256" text-anchor="middle" class="sub" font-size="9.5">PCA9685 driver</text>
    <text x="1085" y="270" text-anchor="middle" class="sub" font-size="9.5">smooth servo motion</text>
  </g>

  <!-- feedback arc -->
  <path d="M1085 285 Q1085 360 600 360 Q115 360 115 285" fill="none" stroke="#e0392f" stroke-width="1.6" stroke-dasharray="6 8" opacity="0.55" class="flow"/>
  <g transform="translate(600,360)">
    <rect x="-180" y="-15" width="360" height="30" rx="15" fill="#120d0a" stroke="#e0392f" stroke-opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="12.5" letter-spacing="1.5" style="animation:glowPulse 3s infinite ease-in-out">CLOSED-LOOP &#183; OPERATOR SEES &amp; CORRECTS IN REAL TIME</text>
  </g>

  <!-- latency tag -->
  <g transform="translate(600,420)">
    <text x="0" y="0" text-anchor="middle" class="sub" font-size="11.5" letter-spacing="1">deterministic RTOS scheduling &#183; multithreaded capture &#183; sub-frame responsiveness</text>
  </g>
</svg>
